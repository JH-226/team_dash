<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협업증진팀 주간 세미나 대시보드</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        /* 신호등 애니메이션 효과 */
        .light-on { box-shadow: 0 0 10px currentColor; opacity: 1; }
        .light-off { opacity: 0.2; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800">

    <header class="flex flex-wrap justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight flex items-center gap-2">
            📊 협업증진팀 주간 세미나 대시보드
        </h1>
        <div class="flex items-center gap-3 mt-4 sm:mt-0 bg-slate-50 p-2 rounded-lg border border-slate-200">
            <input type="date" id="startDate" class="bg-transparent text-sm font-medium text-slate-700 outline-none cursor-pointer">
            <span class="text-slate-400 font-bold">~</span>
            <input type="date" id="endDate" class="bg-transparent text-sm font-medium text-slate-700 outline-none cursor-pointer">
            <button onclick="refreshData()" class="bg-blue-600 text-white px-5 py-2 rounded-md text-sm font-bold hover:bg-blue-700 transition-colors shadow-sm ml-2">
                기간 조회
            </button>
        </div>
    </header>

    <div class="mb-10">
        <h2 class="text-xl font-bold mb-5 flex items-center gap-3">
            🚀 프로젝트별 추진 현황
            <span id="project_count" class="text-sm font-normal text-slate-500 bg-slate-200 px-3 py-1 rounded-full">데이터 불러오는 중...</span>
        </h2>
        <div id="project_cards_container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div class="text-slate-500 p-4">데이터 연동 대기 중입니다...</div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            📌 상시업무 목록
        </h2>
        <div class="overflow-x-auto max-h-[300px]">
            <table class="w-full text-left border-collapse text-sm min-w-[800px]">
                <thead class="sticky top-0 bg-slate-100 shadow-sm z-10">
                    <tr class="text-slate-700 font-bold border-b border-slate-200">
                        <th class="p-3 w-1/4">프로젝트명</th>
                        <th class="p-3 w-2/4">업무내용</th>
                        <th class="p-3 w-1/8 text-center">담당자</th>
                        <th class="p-3 w-1/8 text-center">비고</th>
                    </tr>
                </thead>
                <tbody id="routine_tasks_body" class="text-slate-600 divide-y divide-slate-100">
                    <tr><td colspan="4" class="p-4 text-center text-slate-400">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="commonModal" class="modal flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-3xl w-full mx-4 shadow-2xl relative max-h-[90vh] flex flex-col">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-slate-400 hover:text-red-500 text-2xl font-bold transition-colors">&times;</button>
            <div id="modalContent" class="overflow-y-auto pr-2"></div>
            <div class="text-right mt-6 pt-4 border-t border-slate-100">
                <button onclick="closeModal()" class="bg-slate-700 text-white px-6 py-2.5 rounded-lg text-sm font-bold hover:bg-slate-800 transition-colors">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚨 아래 3곳에 CSV 링크를 반드시 입력하세요!
        // ==========================================
        const URL_PROJECTS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrm-vt2x5APB4umgHpquPu_leD7lztsupjZXd9nJT0qcNE7Al6L3sUqA1ctRHSLUn5OMnWzpVXtgQR/pubhtml?gid=0&single=true"; 
        const URL_ROUTINE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrm-vt2x5APB4umgHpquPu_leD7lztsupjZXd9nJT0qcNE7Al6L3sUqA1ctRHSLUn5OMnWzpVXtgQR/pubhtml?gid=19111981&single=true";
        const URL_LOGS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTrm-vt2x5APB4umgHpquPu_leD7lztsupjZXd9nJT0qcNE7Al6L3sUqA1ctRHSLUn5OMnWzpVXtgQR/pubhtml?gid=1266255410&single=true";

        google.charts.load('current', {'packages':['corechart', 'gauge']});
        google.charts.setOnLoadCallback(initialize);

        let globalProjectsData = [];

        function initialize() {
            const today = new Date();
            document.getElementById('endDate').valueAsDate = today;
            const lastMonth = new Date(today.setMonth(today.getMonth() - 1));
            document.getElementById('startDate').valueAsDate = lastMonth;
            
            if(URL_PROJECTS.includes("여기에")) {
                alert("코드 내 URL_PROJECTS, URL_ROUTINE, URL_LOGS 변수에 CSV 링크를 넣어주세요.");
                return;
            }
            refreshData();
        }

        function refreshData() {
            fetchCSV(URL_PROJECTS, processProjectData, 'project_cards_container');
            fetchCSV(URL_ROUTINE, processRoutineData, 'routine_tasks_body');
        }

        function fetchCSV(url, callback, targetId) {
            Papa.parse(url, {
                download: true,
                header: true, 
                skipEmptyLines: true,
                complete: function(results) { callback(results.data); },
                error: function(err) {
                    console.error("CSV 에러:", err);
                    if(document.getElementById(targetId)) {
                        document.getElementById(targetId).innerHTML = `<div class="text-red-500 p-4 font-bold">데이터 로드 실패: 링크를 확인해주세요.</div>`;
                    }
                }
            });
        }

        // 지능형 데이터 추출 함수 (공백 무시, 유사어 검색)
        function getCol(row, possibleNames, isNumber = false) {
            let val = '';
            for (const key in row) {
                const cleanKey = key.replace(/\s+/g, '').toLowerCase();
                for (const name of possibleNames) {
                    if (cleanKey.includes(name.replace(/\s+/g, '').toLowerCase())) {
                        val = row[key]; break;
                    }
                }
                if (val !== '') break;
            }
            
            if (val === undefined || val === null) val = '';
            if (typeof val === 'string') val = val.trim();
            
            if (isNumber) {
                if (val === '') return 0;
                let num = parseFloat(String(val).replace(/[^0-9.-]+/g,""));
                if (!String(val).includes('%') && num <= 1 && num > 0) num = num * 100; 
                return isNaN(num) ? 0 : num;
            }
            return val;
        }

        // 날짜 차이 계산 함수 (계획 대비 실제 진행률 산출용)
        function calcPlannedProgress(planStartStr, planEndStr) {
            if(!planStartStr || !planEndStr) return 0;
            const start = new Date(planStartStr.replace(/\./g, '-'));
            const end = new Date(planEndStr.replace(/\./g, '-'));
            const today = new Date();
            
            if(isNaN(start) || isNaN(end)) return 0;
            if(today < start) return 0;
            if(today > end) return 100;
            
            const totalDays = (end - start) / (1000 * 60 * 60 * 24);
            const passedDays = (today - start) / (1000 * 60 * 60 * 24);
            return Math.min(100, Math.max(0, (passedDays / totalDays) * 100));
        }

        function processProjectData(rows) {
            globalProjectsData = rows;
            renderProjectCards(rows);
            document.getElementById('project_count').innerText = `총 ${rows.filter(r => getCol(r, ['프로젝트명', '프로젝트'])).length}건`;
        }

        function renderProjectCards(rows) {
            const container = document.getElementById('project_cards_container');
            container.innerHTML = '';

            rows.forEach((row, index) => {
                const pName = getCol(row, ['프로젝트명', '프로젝트']); 
                const pm = getCol(row, ['pm', '담당자']);    
                const actualProgress = getCol(row, ['진행률', '실제진행률', '달성률'], true); 
                
                const planStart = getCol(row, ['계획시작일', '계획시작']); 
                const planEnd = getCol(row, ['계획마감일', '계획종료']);   
                const planPeriod = getCol(row, ['계획기간']) || '-';

                const actualStart = getCol(row, ['착수일', '실제시작일']);
                const actualEnd = getCol(row, ['수행일', '실제마감일']);
                const actualPeriod = getCol(row, ['수행기간', '실제기간']) || '-';
                
                if(!pName) return;

                // 준수율 및 건전성 계산
                const plannedProgress = calcPlannedProgress(planStart, planEnd);
                const progressDiff = actualProgress - plannedProgress;
                
                let healthStatus = 'red'; // 지연
                if(progressDiff >= -5) healthStatus = 'green'; // 정상 (계획 대비 5% 이내)
                else if(progressDiff >= -15) healthStatus = 'yellow'; // 지연 위험

                const cardHtml = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-lg transition-shadow duration-300 flex flex-col h-full">
                        <div class="flex justify-between items-start mb-4">
                            <div class="pr-2">
                                <h3 class="text-lg font-extrabold text-slate-800 leading-tight mb-1">${pName}</h3>
                                <p class="text-slate-500 text-sm">PM: <span class="font-bold text-slate-700">${pm || '미정'}</span></p>
                            </div>
                            <div class="flex bg-slate-100 p-1.5 rounded-full gap-1.5 border border-slate-200" title="건전성 상태판 (녹색:정상, 황색:지연위험, 적색:지연)">
                                <div class="w-3.5 h-3.5 rounded-full text-green-500 ${healthStatus === 'green' ? 'bg-green-500 light-on' : 'bg-slate-300 light-off'}"></div>
                                <div class="w-3.5 h-3.5 rounded-full text-yellow-500 ${healthStatus === 'yellow' ? 'bg-yellow-500 light-on' : 'bg-slate-300 light-off'}"></div>
                                <div class="w-3.5 h-3.5 rounded-full text-red-500 ${healthStatus === 'red' ? 'bg-red-500 light-on' : 'bg-slate-300 light-off'}"></div>
                            </div>
                        </div>

                        <div class="bg-slate-50 rounded-xl p-3 mb-4 text-xs flex-1 border border-slate-100 space-y-2">
                            <div class="flex justify-between border-b border-slate-200 pb-2">
                                <span class="text-slate-500 font-medium">계획 (${planPeriod})</span>
                                <span class="font-bold text-slate-700">${planStart} ~ ${planEnd}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-blue-600 font-medium">수행 (${actualPeriod})</span>
                                <span class="font-bold text-slate-700">${actualStart} ~ ${actualEnd}</span>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 mt-auto">
                            <div class="relative flex flex-col items-center">
                                <div id="gauge_${index}" style="width: 90px; height: 90px;"></div>
                                <div class="text-[10px] text-slate-400 font-bold mt-[-10px]">실제 진행률</div>
                            </div>
                            <div class="flex-1 flex flex-col gap-2">
                                <button onclick="showInfoModal(${index})" class="w-full bg-indigo-50 text-indigo-700 py-2 rounded-lg text-sm font-bold border border-indigo-100 hover:bg-indigo-100 transition">
                                    ℹ️ 프로젝트 정보
                                </button>
                                <button onclick="showLogModal('${pName}')" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-blue-700 shadow-sm transition">
                                    📝 수행업무 로그
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
                
                setTimeout(() => drawGauge(index, actualProgress, plannedProgress), 100);
            });
        }

        function drawGauge(id, actual, planned) {
            const el = document.getElementById('gauge_'+id);
            if(!el) return;
            const data = google.visualization.arrayToDataTable([['Label', 'Value'], ['', Number(actual.toFixed(1))]]);
            // 계획 진행률에 따라 게이지 색상 범위 조정 (계획대비 지연되면 빨간색 영역)
            const options = { 
                width: 90, height: 90, 
                redFrom: 0, redTo: Math.max(0, planned - 15), 
                yellowFrom: Math.max(0, planned - 15), yellowTo: Math.max(0, planned - 5), 
                greenFrom: Math.max(0, planned - 5), greenTo: 100, 
                minorTicks: 5 
            };
            new google.visualization.Gauge(el).draw(data, options);
        }

        function processRoutineData(rows) {
            const tbody = document.getElementById('routine_tasks_body');
            if(!rows || rows.length === 0) return;

            let html = '';
            rows.forEach(row => {
                const taskName = getCol(row, ['프로젝트명', '상시업무명']); 
                const taskDesc = getCol(row, ['업무내용', '내용']); 
                const manager = getCol(row, ['담당자']);  
                const link = getCol(row, ['비고', '링크', 'url']);     

                if(!taskName) return;

                let btnHtml = '-';
                if(link && link.startsWith('http')) {
                    btnHtml = `<a href="${link}" target="_blank" class="bg-slate-100 text-blue-600 px-3 py-1.5 rounded-md text-xs font-bold border border-slate-200 hover:bg-blue-50 transition">링크 열기</a>`;
                }

                html += `
                    <tr class="hover:bg-blue-50/50 transition-colors">
                        <td class="p-3 font-bold text-slate-800">${taskName}</td>
                        <td class="p-3 text-slate-600">${taskDesc}</td>
                        <td class="p-3 text-center font-medium">${manager}</td>
                        <td class="p-3 text-center">${btnHtml}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html || '<tr><td colspan="4" class="p-4 text-center text-slate-400">표시할 데이터가 없습니다.</td></tr>';
        }

        function showInfoModal(index) {
            const row = globalProjectsData[index];
            const pName = getCol(row, ['프로젝트명']);
            const purpose = getCol(row, ['배경', '목적']) || '등록된 내용이 없습니다.';
            const scope = getCol(row, ['범위', '업무범위']) || '등록된 내용이 없습니다.';

            document.getElementById('modalContent').innerHTML = `
                <div class="border-b border-slate-200 pb-4 mb-6">
                    <h2 class="text-2xl font-extrabold text-slate-800">📌 ${pName}</h2>
                    <p class="text-slate-500 mt-1">상세 정보 (배경 및 업무 범위)</p>
                </div>
                <div class="space-y-6 text-sm">
                    <div class="bg-blue-50/50 p-5 rounded-xl border border-blue-100">
                        <h4 class="font-extrabold text-blue-800 mb-2 flex items-center gap-2">🎯 배경 및 목적</h4>
                        <p class="text-slate-700 whitespace-pre-wrap leading-relaxed">${purpose}</p>
                    </div>
                    <div class="bg-indigo-50/50 p-5 rounded-xl border border-indigo-100">
                        <h4 class="font-extrabold text-indigo-800 mb-2 flex items-center gap-2">📋 업무 범위</h4>
                        <p class="text-slate-700 whitespace-pre-wrap leading-relaxed">${scope}</p>
                    </div>
                </div>
            `;
            document.getElementById('commonModal').style.display = 'flex';
        }

        function showLogModal(projectName) {
            // 상단 기간 조회 값 가져오기
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);
            endDate.setHours(23, 59, 59); // 해당 일의 끝까지 포함

            document.getElementById('modalContent').innerHTML = `
                <div class="border-b border-slate-200 pb-4 mb-4">
                    <h2 class="text-2xl font-extrabold text-slate-800 flex items-center gap-2">📝 [${projectName}] 업무 로그</h2>
                    <p class="text-slate-500 mt-1">지정된 기간의 수행업무를 불러오는 중입니다...</p>
                </div>
            `;
            document.getElementById('commonModal').style.display = 'flex';

            fetchCSV(URL_LOGS, (rows) => {
                let logHtml = `<table class="w-full text-sm text-left border-collapse min-w-[600px]">
                    <thead class="bg-slate-100 text-slate-700 sticky top-0"><tr class="border-b border-slate-200">
                        <th class="p-3 w-1/5">일자</th><th class="p-3 w-2/5">수행내용</th><th class="p-3 w-1/5">이슈/특이사항</th><th class="p-3 w-1/5 text-center">성과품</th>
                    </tr></thead><tbody class="divide-y divide-slate-100">`;
                
                let count = 0;
                rows.forEach(row => {
                    const rowProjectName = getCol(row, ['프로젝트명', '프로젝트']); 
                    const logDateStr = getCol(row, ['일자', '날짜', '수행일']);
                    
                    // 기간 필터링 로직
                    let isWithinDate = true;
                    if(logDateStr && startDate && endDate) {
                        const logDate = new Date(logDateStr.replace(/\./g, '-'));
                        if(logDate >= startDate && logDate <= endDate) isWithinDate = true;
                        else isWithinDate = false;
                    }

                    if(rowProjectName === projectName && isWithinDate) {
                        count++;
                        const content = getCol(row, ['수행내용', '내용']);
                        const issue = getCol(row, ['이슈', '특이사항', '비고']);
                        const link = getCol(row, ['성과품', '링크', 'url']);

                        let linkBtn = '-';
                        if(link && link.startsWith('http')) {
                            linkBtn = `<a href="${link}" target="_blank" class="bg-blue-600 text-white px-3 py-1.5 rounded-md text-xs font-bold hover:bg-blue-700 transition shadow-sm">링크 팝업</a>`;
                        }
                        logHtml += `<tr class="hover:bg-slate-50">
                            <td class="p-3 font-medium text-slate-600">${logDateStr}</td>
                            <td class="p-3 text-slate-800">${content}</td>
                            <td class="p-3 text-red-500 font-medium">${issue}</td>
                            <td class="p-3 text-center">${linkBtn}</td>
                        </tr>`;
                    }
                });

                if(count === 0) {
                    logHtml += `<tr><td colspan="4" class="p-8 text-center text-slate-400 bg-slate-50">해당 기간에 등록된 프로젝트 업무 로그가 없습니다.</td></tr>`;
                }
                logHtml += `</tbody></table>`;

                document.getElementById('modalContent').innerHTML = `
                    <div class="border-b border-slate-200 pb-4 mb-4 flex justify-between items-end">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-800">📝 [${projectName}] 업무 로그</h2>
                            <p class="text-blue-600 font-bold mt-1 text-sm">조회된 로그: ${count}건</p>
                        </div>
                    </div>
                    <div class="overflow-x-auto overflow-y-auto max-h-[60vh] rounded-xl border border-slate-200">
                        ${logHtml}
                    </div>
                `;
            });
        }

        function closeModal() {
            document.getElementById('commonModal').style.display = 'none';
        }
    </script>
</body>
</html>
