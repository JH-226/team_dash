<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협업증진팀 주간 세미나 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">

    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex justify-between items-end border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-900">협업증진팀 주간 세미나 대시보드</h1>
            
            <div class="flex items-center space-x-2 bg-white p-2 rounded shadow-sm">
                <span class="text-sm font-semibold text-gray-600">조회 기간:</span>
                <input type="date" id="startDate" class="border rounded p-1 text-sm">
                <span>~</span>
                <input type="date" id="endDate" class="border rounded p-1 text-sm">
                <button onclick="applyDateFilter()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">조회</button>
            </div>
        </header>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-blue-500 pl-2">상시업무 목록</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm text-left border">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 border">프로젝트명</th>
                            <th class="p-3 border">업무내용</th>
                            <th class="p-3 border">담당자</th>
                            <th class="p-3 border text-center">비고 (링크)</th>
                        </tr>
                    </thead>
                    <tbody id="routineTasksTableBody">
                        <tr><td colspan="4" class="p-3 text-center text-gray-500">데이터를 불러오는 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-4 border-l-4 border-green-500 pl-2">프로젝트별 현황</h2>
            <div id="projectsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </div>

    <div id="infoModal" class="modal fixed inset-0 bg-black bg-opacity-50 justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg w-[500px] max-w-full shadow-2xl relative">
            <h3 class="text-xl font-bold mb-4" id="modalProjectName">프로젝트 정보</h3>
            <div class="space-y-4 text-sm">
                <div>
                    <h4 class="font-bold text-gray-700">배경 및 목적</h4>
                    <p id="modalBackground" class="mt-1 text-gray-600 bg-gray-50 p-2 rounded"></p>
                </div>
                <div>
                    <h4 class="font-bold text-gray-700">업무 범위</h4>
                    <p id="modalScope" class="mt-1 text-gray-600 bg-gray-50 p-2 rounded"></p>
                </div>
            </div>
            <button onclick="closeModal('infoModal')" class="mt-6 w-full bg-gray-200 text-gray-800 py-2 rounded hover:bg-gray-300">닫기</button>
        </div>
    </div>

    <div id="logModal" class="modal fixed inset-0 bg-black bg-opacity-50 justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg w-[800px] max-w-full shadow-2xl relative">
            <h3 class="text-xl font-bold mb-4" id="logModalTitle">수행업무로그</h3>
            <div class="overflow-y-auto max-h-96">
                <table class="min-w-full text-sm text-left border">
                    <thead class="bg-gray-100 sticky top-0">
                        <tr>
                            <th class="p-2 border">일자</th>
                            <th class="p-2 border">수행내용</th>
                            <th class="p-2 border">이슈 및 특이사항</th>
                            <th class="p-2 border">성과품</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        </tbody>
                </table>
            </div>
            <button onclick="closeModal('logModal')" class="mt-6 w-full bg-gray-200 text-gray-800 py-2 rounded hover:bg-gray-300">닫기</button>
        </div>
    </div>

    <script>
        // 구글 시트 정보 (아이디)
        const SPREADSHEET_ID = '1RwfLblZvIL__tW_k54u-UwpCrwIJCqZ8PIA1L_pSjbQ';
        
        // 탭(시트) 이름 설정 (실제 구글 시트의 탭 이름과 정확히 일치해야 합니다)
        const SHEET_ROUTINE = '분기 과업수행현황'; // 1번 탭 이름
        const SHEET_PROJECTS = '상시업무'; // 2번 탭 이름
        const SHEET_LOGS = '일일업무로그'; // 3번 탭 이름

        let globalLogsData = []; // 로그 데이터를 전역으로 보관

        // 초기 데이터 로드
        async function initDashboard() {
            await fetchRoutineTasks();
            await fetchLogsData(); // 로그 데이터를 먼저 불러옵니다.
            await fetchProjects();
        }

        // 구글 시트 데이터를 JSON으로 가져오는 유틸리티 함수
        async function fetchSheetData(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
            const response = await fetch(url);
            const text = await response.text();
            // JSONP 형태의 응답을 순수 JSON 객체로 변환
            const json = JSON.parse(text.substring(47).slice(0, -2));
            return json.table.rows.map(row => {
                return row.c.map(cell => cell ? cell.v : '');
            });
        }

        // 3. 상시업무 데이터 렌더링
        async function fetchRoutineTasks() {
            try {
                // 가정: A열=프로젝트명, B열=업무내용, C열=담당자, D열=비고(링크)
                const data = await fetchSheetData(SHEET_ROUTINE);
                const tbody = document.getElementById('routineTasksTableBody');
                tbody.innerHTML = '';
                
                // 첫 행은 헤더라고 가정하고 인덱스 1부터 시작
                for(let i = 1; i < data.length; i++) {
                    if(!data[i][0]) continue;
                    const linkBtn = data[i][3] ? `<a href="${data[i][3]}" target="_blank" class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs hover:bg-blue-200 font-bold">링크 열기</a>` : '-';
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-3 font-semibold">${data[i][0]}</td>
                            <td class="p-3">${data[i][1]}</td>
                            <td class="p-3">${data[i][2]}</td>
                            <td class="p-3 text-center">${linkBtn}</td>
                        </tr>
                    `;
                }
            } catch(e) { console.error('상시업무 로드 실패', e); }
        }

        // 로그 데이터 미리 로드
        async function fetchLogsData() {
            try {
                // 가정: A열=프로젝트명, B열=일자, C열=수행내용, D열=이슈, E열=성과품링크
                const data = await fetchSheetData(SHEET_LOGS);
                globalLogsData = data;
            } catch(e) { console.error('로그 로드 실패', e); }
        }

        // 4. 프로젝트 현황 렌더링
        async function fetchProjects() {
            try {
                // 가정: A=프로젝트명, B=PM, C=배경, D=범위, E=현재진행률(%), F=계획시작일, G=계획마감일, H=착수일, I=최근수행일
                const data = await fetchSheetData(SHEET_PROJECTS);
                const container = document.getElementById('projectsContainer');
                container.innerHTML = '';

                const today = new Date();

                for(let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if(!row[0]) continue; // 빈 행 건너뛰기

                    const projName = row[0];
                    const pm = row[1];
                    const bg = row[2];
                    const scope = row[3];
                    const actualProgress = parseFloat(row[4]) || 0;
                    
                    const planStart = new Date(row[5]);
                    const planEnd = new Date(row[6]);
                    const actualStart = new Date(row[7]);
                    const actualEnd = new Date(row[8]); // 최근수행일

                    // 기간 계산
                    const planDays = Math.max(1, Math.ceil((planEnd - planStart) / (1000*60*60*24)));
                    const actualDays = Math.max(1, Math.ceil((actualEnd - actualStart) / (1000*60*60*24)));
                    
                    // 계획된 진행률 계산 (현재 날짜 기준)
                    let plannedProgress = 0;
                    if(today >= planEnd) plannedProgress = 100;
                    else if (today > planStart) {
                        plannedProgress = ((today - planStart) / (planEnd - planStart)) * 100;
                    }

                    // 건전성 상태판 (신호등)
                    let healthColor = 'bg-green-500'; // 정상
                    let healthText = '정상';
                    if (actualProgress < plannedProgress - 15) {
                        healthColor = 'bg-red-500'; // 지연
                        healthText = '지연';
                    } else if (actualProgress < plannedProgress) {
                        healthColor = 'bg-yellow-400'; // 지연 위험
                        healthText = '위험';
                    }

                    const cardId = `chart-${i}`;

                    const cardHTML = `
                        <div class="bg-white rounded-lg shadow-md p-5 border border-gray-100 flex flex-col h-full">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800">${projName}</h3>
                                    <p class="text-xs text-gray-500">PM: ${pm}</p>
                                </div>
                                <div class="flex items-center space-x-1">
                                    <span class="w-3 h-3 rounded-full ${healthColor} inline-block animate-pulse"></span>
                                    <span class="text-xs font-bold text-gray-600">${healthText}</span>
                                </div>
                            </div>

                            <div class="text-sm space-y-2 mb-4 bg-gray-50 p-3 rounded">
                                <div class="flex justify-between"><span class="text-gray-500">계획:</span> <span>${formatDate(planStart)} ~ ${formatDate(planEnd)} (${planDays}일)</span></div>
                                <div class="flex justify-between"><span class="text-gray-500">수행:</span> <span>${formatDate(actualStart)} ~ ${formatDate(actualEnd)} (${actualDays}일)</span></div>
                            </div>

                            <div class="flex space-x-2 mb-4">
                                <button onclick="openInfoModal('${projName}', '${escapeHtml(bg)}', '${escapeHtml(scope)}')" class="flex-1 bg-indigo-50 text-indigo-600 text-xs font-bold py-2 rounded hover:bg-indigo-100 border border-indigo-200">프로젝트 정보</button>
                                <button onclick="openLogModal('${projName}')" class="flex-1 bg-teal-50 text-teal-600 text-xs font-bold py-2 rounded hover:bg-teal-100 border border-teal-200">수행업무 로그</button>
                            </div>

                            <div class="mt-auto relative h-40">
                                <div id="${cardId}" class="w-full h-full"></div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;

                    // DOM이 렌더링된 후 차트 그리기 지연 실행
                    setTimeout(() => drawGaugeChart(cardId, plannedProgress, actualProgress), 100);
                }

            } catch(e) { console.error('프로젝트 현황 로드 실패', e); }
        }

        // 게이지 차트 렌더링 (ECharts)
        function drawGaugeChart(elementId, planned, actual) {
            const chartDom = document.getElementById(elementId);
            if(!chartDom) return;
            const myChart = echarts.init(chartDom);
            
            const option = {
                series: [
                    {
                        type: 'gauge',
                        startAngle: 180, endAngle: 0,
                        center: ['50%', '75%'], radius: '90%',
                        min: 0, max: 100,
                        splitNumber: 5,
                        axisLine: {
                            lineStyle: { width: 10, color: [[1, '#e5e7eb']] }
                        },
                        pointer: {
                            icon: 'path://M12.8,0.7l12,40.1H0.7L12.8,0.7z',
                            length: '12%', width: 10,
                            offsetCenter: [0, '-60%'],
                            itemStyle: { color: 'auto' }
                        },
                        axisTick: { show: false },
                        splitLine: { show: false },
                        axisLabel: { show: false },
                        title: { show: false },
                        detail: {
                            fontSize: 16, offsetCenter: [0, '0%'],
                            valueAnimation: true,
                            formatter: function (value) { return '실제: ' + Math.round(value) + '%'; },
                            color: '#1f2937'
                        },
                        data: [{ value: actual, name: '실제 진행률' }]
                    },
                    {
                        type: 'gauge',
                        startAngle: 180, endAngle: 0,
                        center: ['50%', '75%'], radius: '90%',
                        min: 0, max: 100,
                        itemStyle: { color: '#3b82f6' }, // 계획은 파란색
                        progress: { show: true, width: 10 },
                        pointer: { show: false },
                        axisLine: { show: false },
                        axisTick: { show: false },
                        splitLine: { show: false },
                        axisLabel: { show: false },
                        detail: { show: false },
                        data: [{ value: planned }]
                    }
                ]
            };
            myChart.setOption(option);
            window.addEventListener('resize', () => myChart.resize());
        }

        // 유틸리티 및 모달 제어 함수
        function formatDate(dateObj) {
            if(isNaN(dateObj)) return '-';
            return `${dateObj.getFullYear()}.${String(dateObj.getMonth()+1).padStart(2,'0')}.${String(dateObj.getDate()).padStart(2,'0')}`;
        }

        function escapeHtml(text) {
            if(!text) return '';
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '<br>');
        }

        function openInfoModal(name, bg, scope) {
            document.getElementById('modalProjectName').innerText = name;
            document.getElementById('modalBackground').innerHTML = bg || '내용 없음';
            document.getElementById('modalScope').innerHTML = scope || '내용 없음';
            document.getElementById('infoModal').classList.add('active');
        }

        function openLogModal(projectName) {
            document.getElementById('logModalTitle').innerText = `[${projectName}] 수행업무로그`;
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = '';

            // 로그 데이터 필터링
            const logs = globalLogsData.filter(row => row[0] === projectName);
            
            if(logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">등록된 로그가 없습니다.</td></tr>';
            } else {
                logs.forEach(row => {
                    const date = row[1] ? row[1] : '-';
                    const content = row[2] || '-';
                    const issue = row[3] || '-';
                    const linkBtn = row[4] ? `<a href="${row[4]}" target="_blank" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs hover:bg-blue-200">성과품 열기</a>` : '-';
                    
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-2 whitespace-nowrap text-xs">${date}</td>
                            <td class="p-2 text-xs">${content}</td>
                            <td class="p-2 text-xs text-red-600">${issue}</td>
                            <td class="p-2 text-center">${linkBtn}</td>
                        </tr>
                    `;
                });
            }
            document.getElementById('logModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function applyDateFilter() {
            // 기간 조회 시 기능 연동 (필요 시 테이블 필터링 로직 추가 구현)
            alert('입력된 기간 기준으로 데이터 필터링을 다시 불러옵니다.\n(추가 데이터 필터링 연동이 필요합니다.)');
        }

        // 실행
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
